<!DOCTYPE html>
<html lang="nl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SmartGrid</title>
    <link rel="stylesheet" href="static/css/bootstrap.min.css">
    <link rel="stylesheet" href="static/css/jquery.minicolors.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    
    <style>
        :root {
            --bg-color: #ffffff;
            --main-color: #ff6600; 
            --text-color: #1a1a1a;
            --sidebar-bg: #f8f9fa;
            --card-bg: rgba(245, 245, 245, 0.4);
            --glass-border: rgba(0, 0, 0, 0.05);
            --liquid-shadow: inset 0 2px 5px rgba(255,255,255,0.5), 0 5px 15px rgba(0,0,0,0.05);
            --cta-gradient: linear-gradient(-45deg, #ff6600, #ff9e00, #ff6600);
        }

        @media (prefers-color-scheme: dark) {
            :root {
                --bg-color: #0a0a0a;
                --main-color: #3b82f6; 
                --text-color: #ffffff;
                --sidebar-bg: #111214;
                --card-bg: rgba(22, 22, 22, 0.4);
                --glass-border: rgba(255, 255, 255, 0.1);
                --liquid-shadow: inset 0 1px 1px rgba(255,255,255,0.1), 0 10px 20px rgba(0,0,0,0.3);
                --cta-gradient: linear-gradient(-45deg, #3b82f6, #2dd4bf, #3b82f6);
            }
        }

        @keyframes liquidFlow {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        body {
            font-family: 'Segoe UI', system-ui, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            margin: 0;
            display: flex;
            height: 100vh;
            overflow: hidden;
        }

        .sidebar {
            width: 280px;
            background: var(--sidebar-bg);
            border-right: 1px solid var(--glass-border);
            display: flex;
            flex-direction: column;
            padding: 40px 20px;
            backdrop-filter: blur(10px);
        }

        /* AANPASSING HIER: text-align center toegevoegd */
        .logo-box {
            font-weight: 900; 
            font-size: 2rem; 
            color: var(--main-color);
            text-decoration: none !important; 
            margin-bottom: 50px;
            letter-spacing: -1.5px; 
            cursor: pointer;
            text-align: center; 
            width: 100%;
        }

        .nav-item {
            padding: 16px 20px; margin-bottom: 10px; border-radius: 18px;
            cursor: pointer; display: flex; align-items: center; gap: 15px;
            font-weight: 600; transition: 0.3s; color: var(--text-color);
            opacity: 0.6;
        }

        .nav-item:hover { opacity: 1; background: var(--card-bg); }
        .nav-item.active { opacity: 1; background: var(--main-color); color: white; }

        .main-content {
            flex: 1; padding: 60px; display: flex; flex-direction: column;
            justify-content: center; align-items: center; overflow-y: auto;
        }

        .page { display: none; width: 100%; max-width: 800px; animation: fadeIn 0.5s ease; }
        .page.active { display: block; }

        @keyframes fadeIn { from { opacity: 0; transform: translateY(15px); } to { opacity: 1; transform: translateY(0); } }

        .glass-card {
            background: var(--card-bg); border: 1px solid var(--glass-border);
            border-radius: 35px; padding: 50px; box-shadow: var(--liquid-shadow);
            backdrop-filter: blur(20px);
        }

        .welcome-text { text-align: center; }
        .welcome-text h1 { font-size: 5.5rem; font-weight: 900; color: var(--main-color); letter-spacing: -3px; margin: 0; }
        .welcome-text p { font-size: 1.8rem; font-weight: 300; margin-top: 5px; }
        .welcome-text b { font-weight: 800; color: var(--main-color); }

        .form-control { 
            background: var(--bg-color); border: 1px solid var(--glass-border); 
            color: var(--text-color); border-radius: 15px; padding: 15px; height: auto;
        }

        .btn-action { 
            background: var(--cta-gradient); background-size: 200% 200%;
            animation: liquidFlow 5s infinite; color: white; border: none; 
            border-radius: 20px; padding: 20px; font-weight: 800; font-size: 1.2rem; 
            width: 100%; transition: 0.3s; margin-top: 30px;
        }
        
        .discord-btn {
            margin-top: auto; padding: 15px; border-radius: 15px; text-align: center;
            background: rgba(88, 101, 242, 0.1); color: #5865F2; text-decoration: none !important;
            font-weight: 700; transition: 0.3s;
        }

        #status-message { 
            position: fixed; top: 30px; right: 30px; background: var(--main-color); 
            color: white; padding: 15px 30px; border-radius: 20px; display: none; font-weight: 800;
        }
    </style>
</head>
<body>

    <div class="sidebar">
        <div class="logo-box" id="go-home">SmartGrid</div>
        <div class="nav-item" data-target="page-style"><i class="fa-solid fa-palette"></i> Style Instellingen</div>
        <div class="nav-item" data-target="page-trolls"><i class="fa-solid fa-ghost"></i> Fake Messages</div>
        <a href="https://discord.gg/CkeXqXpQGa" target="_blank" class="discord-btn"><i class="fa-brands fa-discord"></i> Discord</a>
    </div>

    <div class="main-content">
        <div id="page-home" class="page active">
            <div class="welcome-text">
                <h1>SmartGrid</h1>
                <p>beste <b>Smartschool extensie</b></p>
            </div>
        </div>

        <div id="page-style" class="page">
            <div class="glass-card">
                <h2>Style Instellingen</h2>
                <label>Thema Modus</label>
                <select id="theme" class="form-control">
                    <option value="light">Browser Standaard</option>
                    <option value="custom">Custom Kleur</option>
                </select>
                <div id="colors" style="display: none; margin-top: 30px;">
                    <label>Kies je Topbar kleur</label>
                    <input id="colortb" type="text" class="color form-control" data-control="hue">
                </div>
                <button id="save" class="btn-action">Instellingen Opslaan</button>
            </div>
        </div>

        <div id="page-trolls" class="page">
            <div class="glass-card">
                <h2>Fake Messages</h2>
                <input type="number" id="max-msgs" class="form-control" value="10">
                <button id="fake-msg" class="btn-action">Start de messages</button>
                <div id="reset-msg" style="color:red; text-align:center; cursor:pointer; margin-top:20px; font-weight:bold;">STOP & RESET</div>
            </div>
        </div>
    </div>

    <div id="status-message"></div>

    <script src="static/js/jquery-3.4.1.min.js"></script>
    <script src="static/js/jquery.minicolors.min.js"></script>
    <script src="options.js"></script>
</body>
</html>
